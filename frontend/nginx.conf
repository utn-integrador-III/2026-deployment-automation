server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page demo: always serve index.html.
    location / {
        try_files $uri /index.html;
    }

    # Lightweight health endpoint for Fly's checks.
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
